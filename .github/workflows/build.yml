name: Build EDT Debug Tracer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install requests flask
      - name: Run Python API tests (mock)
        run: |
          cd tests
          python mock_server.py &
          sleep 1
          python test_mcp_api.py
