name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-tests:
    name: MCP API smoke tests (mock server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Start mock MCP server
        run: |
          python tests/mock_server.py &
          sleep 1

      - name: Run API tests
        run: python tests/test_mcp_api.py
